<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Flat Booking</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container py-5">

        <h1 class="text-center mb-5">Sunrise Avenue Flats</h1>

        <div class="row g-4">

            <!-- 3BHK Flat -->

            <div class="col-md-4">
                <div class="card">

                    <div id="flat1" class="carousel slide" data-bs-ride="carousel">

                        <div class="carousel-inner">

                            <div class="carousel-item active">
                                <img src="https://images.unsplash.com/photo-1505693416388-ac5ce068fe85?q=80&w=1200&auto=format&fit=crop" class="d-block w-100">
                            </div>

                            <div class="carousel-item">
                                <img src="https://images.unsplash.com/photo-1494526585095-c41746248156?q=80&w=1200&auto=format&fit=crop" class="d-block w-100">
                            </div>

                        </div>

                        <button class="carousel-control-prev" type="button" data-bs-target="#flat1" data-bs-slide="prev">
                            <span class="carousel-control-prev-icon"></span>
                        </button>

                        <button class="carousel-control-next" type="button" data-bs-target="#flat1" data-bs-slide="next">
                            <span class="carousel-control-next-icon"></span>
                        </button>

                    </div>

                    <div class="card-body">

                        <h5>3BHK Flat</h5>
                        <p>Sunrise Avenue</p>
                        <p class="fw-bold">₹50,000</p>

                        <iframe width="100%" height="150" src="https://www.google.com/maps?q=17.4399,78.4983&hl=es;z=15&output=embed">
                        </iframe>

                        <button class="btn btn-primary w-100 mt-3" data-bs-toggle="modal" data-bs-target="#bookingModal">
                            Book Now
                        </button>

                    </div>
                </div>
            </div>

            <!-- 2BHK Flat -->

            <div class="col-md-4">
                <div class="card">

                    <div id="flat2" class="carousel slide" data-bs-ride="carousel">

                        <div class="carousel-inner">

                            <div class="carousel-item active">
                                <img src="https://images.unsplash.com/photo-1460317442991-0ec209397118?q=80&w=1200&auto=format&fit=crop" class="d-block w-100">
                            </div>

                            <div class="carousel-item">
                                <img src="https://images.unsplash.com/photo-1502672260266-1c1ef2d93688?q=80&w=1200&auto=format&fit=crop" class="d-block w-100">
                            </div>

                        </div>

                        <button class="carousel-control-prev" type="button" data-bs-target="#flat2" data-bs-slide="prev">
                            <span class="carousel-control-prev-icon"></span>
                        </button>

                        <button class="carousel-control-next" type="button" data-bs-target="#flat2" data-bs-slide="next">
                            <span class="carousel-control-next-icon"></span>
                        </button>

                    </div>

                    <div class="card-body">

                        <h5>2BHK Flat</h5>
                        <p>Green Park</p>
                        <p class="fw-bold">₹35,000</p>

                        <iframe width="100%" height="150" src="https://www.google.com/maps?q=17.4500,78.4900&hl=es;z=15&output=embed">
                        </iframe>

                        <button class="btn btn-primary w-100 mt-3" data-bs-toggle="modal" data-bs-target="#bookingModal">
                            Book Now
                        </button>

                    </div>
                </div>
            </div>

            <!-- 4BHK Flat -->

            <div class="col-md-4">
                <div class="card">

                    <div id="flat3" class="carousel slide" data-bs-ride="carousel">

                        <div class="carousel-inner">

                            <div class="carousel-item active">
                                <img src="https://images.unsplash.com/photo-1494526585095-c41746248156?q=80&w=1200&auto=format&fit=crop" class="d-block w-100">
                            </div>

                            <div class="carousel-item">
                                <img src="https://images.unsplash.com/photo-1484154218962-a197022b5858?q=80&w=1200&auto=format&fit=crop" class="d-block w-100">
                            </div>

                        </div>

                        <button class="carousel-control-prev" type="button" data-bs-target="#flat3" data-bs-slide="prev">
                            <span class="carousel-control-prev-icon"></span>
                        </button>

                        <button class="carousel-control-next" type="button" data-bs-target="#flat3" data-bs-slide="next">
                            <span class="carousel-control-next-icon"></span>
                        </button>

                    </div>

                    <div class="card-body">

                        <h5>4BHK Flat</h5>
                        <p>Blue Hills</p>
                        <p class="fw-bold">₹70,000</p>

                        <iframe width="100%" height="150" src="https://www.google.com/maps?q=17.4600,78.4800&hl=es;z=15&output=embed">
                        </iframe>

                        <button class="btn btn-primary w-100 mt-3" data-bs-toggle="modal" data-bs-target="#bookingModal">
                            Book Now
                        </button>

                    </div>
                </div>
            </div>

        </div>

    </div>

    <!-- Modal -->

    <div class="modal fade" id="bookingModal">

        <div class="modal-dialog">

            <div class="modal-content">

                <div class="modal-header bg-primary text-white">

                    <h5 class="modal-title">Book Flat</h5>

                    <button type="button" class="btn-close bg-white" data-bs-dismiss="modal">
                    </button>

                </div>

                <div class="modal-body">

                    <form>

                        <div class="mb-3">
                            <label>Name</label>
                            <input type="text" class="form-control">
                        </div>

                        <div class="mb-3">
                            <label>Email</label>
                            <input type="email" class="form-control">
                        </div>

                        <div class="mb-3">
                            <label>Move-in Date</label>
                            <input type="date" class="form-control">
                        </div>

                        <button class="btn btn-primary w-100">
                            Confirm Booking
                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
